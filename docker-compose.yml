services:
  krythor:
    # Use the pre-built image from GitHub Container Registry (recommended):
    #   image: ghcr.io/luxagrid/krythor:latest
    # Or build from source (default for development):
    build: .
    ports:
      - "47200:47200"
    volumes:
      - krythor-data:/data
    environment:
      - KRYTHOR_DATA_DIR=/data
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  krythor-data:
