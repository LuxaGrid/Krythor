name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            target: win-x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: linux-x64
          - os: macos-latest
            platform: mac
            arch: arm64
            target: macos-arm64
          - os: macos-14
            platform: mac
            arch: x64
            target: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Patch version in package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Patch version in installer/krythor.iss (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          sed -i "s/^#define MyAppVersion.*/#define MyAppVersion   \"${VERSION}\"/" installer/krythor.iss

      - name: Build all packages
        run: pnpm build

      - name: Bundle (platform-specific, with bundled Node runtime)
        run: node bundle.js --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      - name: Rebuild better-sqlite3 against bundled runtime (non-Windows)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          DIST="krythor-dist-${{ matrix.platform }}"
          RUNTIME="$(pwd)/$DIST/runtime/node"
          chmod +x "$RUNTIME"
          SQLITE_DIR="$(pwd)/$DIST/node_modules/better-sqlite3"
          # Use node-gyp from repo's top-level node_modules (not bundled sqlite3 deps)
          NODEGYP="$(pwd)/node_modules/.bin/node-gyp"
          echo "Rebuilding better-sqlite3 against bundled Node $($RUNTIME --version)..."
          cd "$SQLITE_DIR"
          "$RUNTIME" "$NODEGYP" rebuild --nodedir="$(dirname $(dirname $RUNTIME))"
          echo "✓ Rebuild complete"

      - name: Rebuild better-sqlite3 against bundled runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $root    = $env:GITHUB_WORKSPACE
          $dist    = "$root\krythor-dist-win"
          $runtime = "$dist\runtime\node.exe"
          $sqlite  = "$dist\node_modules\better-sqlite3"
          # Use node-gyp from repo's top-level node_modules
          $nodegyp = "$root\node_modules\.bin\node-gyp"
          $nodeVer = & $runtime --version
          Write-Host "Rebuilding better-sqlite3 against bundled Node $nodeVer..."
          Push-Location $sqlite
          & $runtime $nodegyp rebuild
          Pop-Location
          if ($LASTEXITCODE -ne 0) { Write-Error "Rebuild failed"; exit 1 }
          Write-Host "✓ Rebuild complete"

      - name: Verify native module loads under bundled runtime (non-Windows)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          DIST="krythor-dist-${{ matrix.platform }}"
          RUNTIME="$DIST/runtime/node"
          chmod +x "$RUNTIME"
          cd "$DIST"
          if "../$RUNTIME" -e "require('./node_modules/better-sqlite3')"; then
            echo "✓ better-sqlite3 loads OK under bundled runtime"
          else
            echo "✗ better-sqlite3 failed to load under bundled runtime"
            exit 1
          fi

      - name: Verify native module loads under bundled runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dist    = "krythor-dist-win"
          $runtime = "$dist\runtime\node.exe"
          Push-Location $dist
          $result = & $env:GITHUB_WORKSPACE\$runtime -e "require('./node_modules/better-sqlite3')" 2>&1
          Pop-Location
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✓ better-sqlite3 loads OK under bundled runtime"
          } else {
            Write-Host "✗ better-sqlite3 failed to load under bundled runtime"
            Write-Host $result
            exit 1
          }

      - name: Install Inno Setup (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Fetch bundled Node runtime (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: node installer/fetch-node.js

      - name: Build Windows installer (requires krythor-dist-win/)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: node build-installer.js

      - name: Rename installer with version (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mv "installer-out/Krythor-Setup-${VERSION}.exe" "Krythor-Setup-${VERSION}.exe" 2>/dev/null || \
          mv installer-out/Krythor-Setup-*.exe "Krythor-Setup-${VERSION}.exe"

      - name: Rename output folder
        shell: bash
        run: mv krythor-dist-${{ matrix.platform }} krythor-${{ matrix.target }}

      - name: Zip distribution (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path "krythor-${{ matrix.target }}\*" -DestinationPath "krythor-${{ matrix.target }}.zip" -Force

      - name: Zip distribution (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd krythor-${{ matrix.target }}
          zip -r ../krythor-${{ matrix.target }}.zip .

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: krythor-${{ matrix.target }}
          retention-days: 1
          path: krythor-${{ matrix.target }}.zip

      - name: Upload installer artifact (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: krythor-win-installer
          retention-days: 1
          path: Krythor-Setup-*.exe

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download all zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: krythor-*
          merge-multiple: true
          path: dist-artifacts

      - name: List collected assets
        run: ls -lh dist-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Krythor v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-artifacts/krythor-win-x64.zip
            dist-artifacts/krythor-linux-x64.zip
            dist-artifacts/krythor-macos-arm64.zip
            dist-artifacts/krythor-macos-x64.zip
            dist-artifacts/Krythor-Setup-${{ env.VERSION }}.exe
