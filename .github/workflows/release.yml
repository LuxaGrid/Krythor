name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
            target: win-x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: linux-x64
          - os: macos-latest
            platform: mac
            arch: arm64
            target: macos-arm64
          - os: macos-14
            platform: mac
            arch: x64
            target: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Patch version in package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Patch version in installer/krythor.iss (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          sed -i "s/^#define MyAppVersion.*/#define MyAppVersion   \"${VERSION}\"/" installer/krythor.iss

      - name: Build all packages
        run: pnpm build

      - name: Bundle (platform-specific)
        run: node bundle.js --platform ${{ matrix.platform }}

      - name: Install Inno Setup (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Fetch bundled Node runtime (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: node installer/fetch-node.js

      - name: Build Windows installer (requires krythor-dist-win/)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: node build-installer.js

      - name: Rename installer with version (Windows only)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mv "installer-out/Krythor-Setup-${VERSION}.exe" "Krythor-Setup-${VERSION}.exe" 2>/dev/null || \
          mv installer-out/Krythor-Setup-*.exe "Krythor-Setup-${VERSION}.exe"

      - name: Rename output folder
        shell: bash
        run: mv krythor-dist-${{ matrix.platform }} krythor-${{ matrix.target }}

      - name: Zip distribution (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path "krythor-${{ matrix.target }}\*" -DestinationPath "krythor-${{ matrix.target }}.zip" -Force

      - name: Zip distribution (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd krythor-${{ matrix.target }}
          zip -r ../krythor-${{ matrix.target }}.zip .

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: krythor-${{ matrix.target }}
          retention-days: 1
          path: krythor-${{ matrix.target }}.zip

      - name: Upload installer artifact (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: krythor-win-installer
          retention-days: 1
          path: Krythor-Setup-*.exe

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download all zip artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: krythor-*
          merge-multiple: true
          path: dist-artifacts

      - name: List collected assets
        run: ls -lh dist-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Krythor v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-artifacts/krythor-win-x64.zip
            dist-artifacts/krythor-linux-x64.zip
            dist-artifacts/krythor-macos-arm64.zip
            dist-artifacts/krythor-macos-x64.zip
            dist-artifacts/Krythor-Setup-${{ env.VERSION }}.exe
